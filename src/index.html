<!--
    ---------------------------------------------------------------
    Archivo:        index.html
    Descripción:    Documento HTML raíz del frontend del sistema GSXPD. Define la estructura base de la aplicación
                    Angular, carga el componente principal <app-root> y establece la configuración inicial del entorno
                    web (metadatos, codificación, viewport y favicon).
    Autor:          Eugenio Blanco Fernández
    Universidad:    Universitat Oberta de Catalunya (UOC)
    Título Máster:  Máster Universitario en Desarrollo de sitios y
                    aplicaciones Web
    Proyecto:       TFM - Sistema de Gestión de Expedientes Digitales (GSXPD)
    Fecha creación: 01/03/2026
    Última modif.:  25/04/2026

    Detalles:
      - Define la estructura HTML base de la aplicación Angular.
      - Incluye metadatos esenciales: codificación UTF‑8, viewport responsive y título del sistema.
      - Establece la ruta base para el enrutado Angular mediante <base href="/">.
      - Carga el componente raíz <app-root>, punto de entrada del frontend GSXPD.

    ---------------------------------------------------------------

<!doctype html>
<html lang="es">
<head>

  <title>Sistema de Gestión de Expedientes Digitales (GSXPD) - Frontend</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <app-root></app-root>
</body>
</html>
