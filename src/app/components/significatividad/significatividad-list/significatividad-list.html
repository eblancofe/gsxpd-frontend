<!--
    ---------------------------------------------------------------
    Archivo:        significatividad-list.html
    Descripción:    Plantilla HTML del listado de niveles de Significatividad del cambio. Permite buscar,
                    visualizar, paginar y gestionar los niveles registrados, ofreciendo acciones de edición y
                    eliminación para cada elemento dentro del sistema
                    GSXPD.
    Autor:          Eugenio Blanco Fernández
    Universidad:    Universitat Oberta de Catalunya (UOC)
    Título Máster:  Máster Universitario en Desarrollo de sitios y
                    aplicaciones Web
    Proyecto:       TFM - Sistema de Gestión de Expedientes Digitales (GSXPD)
    Fecha creación: 07/03/2026
    Última modif.:  10/04/2026

    Detalles:
      - Incluye el componente reutilizable <app-boton-volver> para regresar al área de Configuración.
      - Implementa un buscador enlazado mediante ngModel, filtrando los niveles de significatividad en tiempo real.
      - Muestra una tabla con el nombre de cada nivel de significatividad registrado.
      - Proporciona acciones de edición y eliminación por registro.
      - Incorpora controles de paginación para navegar entre páginas de resultados.
    ---------------------------------------------------------------

<p>significatividad-list works!</p>
<app-boton-volver ruta="/configuracion"></app-boton-volver>

<h2>Buscar la Significatividad del cambio</h2>

<input type="text" class="form-control" placeholder="Buscar..." [(ngModel)]="search"
    (ngModelChange)="onSearchChange()" />

<hr>

<h2>Lista de la Significatividad del cambio</h2>

<table class="tabla-cuadricula">
    <thead>
        <tr>
            <th>Nombre del tipo de Cambio en el Expediente</th>
            <th class="col-acciones">Acciones</th>
        </tr>
    </thead>
    <tbody>
        @for (u of significatividad; track u.id) {
        <tr>
            <td>{{ u.nombre_Significatividad }}</td>
            <td class="acciones">
                <button (click)="editSignificatividad(u)" class="btn-save2">Editar</button>
                <button (click)="deleteSignificatividad(u.id)" class="btn-save2">Eliminar</button>
            </td>
        </tr>
        }
    </tbody>
</table>

<div>
    <button (click)="prevPage()" [disabled]="page === 1" class="btn-save2">Anterior</button>
    Página {{ page }} de {{ lastPage }}
    <button (click)="nextPage()" [disabled]="page === lastPage" class="btn-save2">Siguiente</button>
</div>
-->


<mat-card class="mat-elevation-z2">
    <!-- BOTÓN VOLVER -->
    <button mat-raised-button color="primary" routerLink="/configuracion" class="btn-volver">
        <mat-icon>arrow_back</mat-icon>
        Volver a Configuración
    </button>
    
    <mat-card-title>
        <strong>Listado de la Significatividad del cambio del Expediente</strong>
    </mat-card-title>

    <mat-divider></mat-divider>

    <!-- BUSCADOR -->
    <mat-form-field appearance="outline" class="buscador">
        <mat-label>Buscar la Significatividad del cambio del Expediente</mat-label>
        <input matInput (keyup)="filtrar($event)" placeholder="Buscar por nombre de la Significatividad">
        <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <!-- TABLA -->
    <table mat-table [dataSource]="dataSource" class="tabla-usuarios mat-elevation-z1">

        <ng-container matColumnDef="nombre">
            <th mat-header-cell *matHeaderCellDef class="fondo_gris"> Nombre de la Significatividad del cambio del Expediente </th>
            <td mat-cell *matCellDef="let u"> {{ u.nombre_Significatividad }} </td>
        </ng-container>

        <!-- ACCIONES -->
        <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef class="fondo_gris"> Acciones </th>
            <td mat-cell *matCellDef="let u">
                <button mat-icon-button color="primary" (click)="editSignificatividad(u)">
                    <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button color="warn" class="rojo" (click)="deleteSignificatividad(u.id)">
                    <mat-icon>delete</mat-icon>
                </button>
            </td>
        </ng-container>

        <!-- HEADER + ROWS -->
        <tr mat-header-row *matHeaderRowDef="columnas"></tr>
        <tr mat-row *matRowDef="let row; columns: columnas;"></tr>

    </table>

    <!-- PAGINADOR 
    <mat-paginator [pageSize]="5" showFirstLastButtons></mat-paginator>
-->
    <!-- PAGINACIÓN DEL BACKEND -->
    <div class="paginacion">
        <button mat-raised-button color="primary" (click)="prevPage()" [disabled]="page === 1">
            <mat-icon>arrow_back</mat-icon>
            Anterior
        </button>
    
        <span class="pagina-info">
            Página {{ page }} de {{ lastPage }}
        </span>
    
        <button mat-raised-button color="primary" (click)="nextPage()" [disabled]="page === lastPage">
            Siguiente
            <mat-icon>arrow_forward</mat-icon>
        </button>
    </div>

</mat-card>
